* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #0C0C0E; color: #e8e8e8; min-height: 100vh; }
select, input, button { font-family: inherit; }

.header { background: linear-gradient(135deg,#100F0F,#141420); border-bottom: 1px solid #222; padding: 16px 24px 14px; }
.logo-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.logo-icon { width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#57DF7F,#3A6BF5);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#000; }
.logo-title { font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.5px; }
.logo-sub { font-size:10px;color:#57DF7F;font-weight:600;letter-spacing:.15em;text-transform:uppercase; }
.stats-bar { display:flex;gap:10px;flex-wrap:wrap; }
.stat { background:rgba(255,255,255,.04);border:1px solid #222;border-radius:10px;padding:7px 14px;display:flex;flex-direction:column;gap:1px; }
.stat-num { font-size:19px;font-weight:800;color:#57DF7F; }
.stat-lbl { font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.1em; }
.filter-bar { background:#111115;border-bottom:1px solid #1e1e1e;padding:11px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end; }
.fg { display:flex;flex-direction:column;gap:3px; }
.fg label { font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.1em; }
.fg input, .fg select { background:#1a1a20;border:1px solid #2e2e38;border-radius:8px;color:#e8e8e8;padding:7px 10px;font-size:12px;outline:none; }
.view-btns { margin-left:auto;display:flex;gap:6px;align-items:center; }
.vbtn { background:transparent;border:1px solid #2e2e38;color:#888;border-radius:7px;padding:6px 12px;font-size:11px;cursor:pointer;font-weight:600; }
.vbtn.active { background:#57DF7F22;border-color:#57DF7F;color:#57DF7F; }
.vbtn.clear { color:#f87171;border-color:#f8717166; }
.grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:12px;padding:18px 24px; }
.card { background:#14141a;border:1px solid #222;border-radius:14px;padding:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden; }
.card:hover { background:#1a1a24;border-color:#333;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4); }
.card-accent { position:absolute;top:0;left:0;right:0;height:3px; }
.card-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px;flex-wrap:wrap; }
.badges { display:flex;gap:4px;flex-wrap:wrap; }
.badge { display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em;white-space:nowrap; }
.card-title { font-weight:800;font-size:13px;color:#fff;margin-bottom:3px;line-height:1.3; }
.card-local { font-size:11px;color:#888;margin-bottom:8px; }
.card-desc { font-size:11px;color:#777;line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
.card-bottom { display:flex;justify-content:space-between;align-items:center;border-top:1px solid #1e1e1e;padding-top:8px; }
.card-valor { font-size:13px;font-weight:700; }
.card-total { font-size:10px;color:#555;margin-top:2px; }
.avatars { display:flex; }
.av { width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;border:2px solid #14141a;margin-left:-6px; }
.lista-wrap { padding:14px 24px; }
.lista-head { display:grid;grid-template-columns:90px 1fr 75px 80px 155px 115px;gap:8px;align-items:center;background:#111115;border-radius:8px 8px 0 0;padding:8px 14px; }
.lista-head span { font-size:9px;color:#666;font-weight:700;text-transform:uppercase; }
.lrow { display:grid;grid-template-columns:90px 1fr 75px 80px 155px 115px;gap:8px;align-items:center;background:#0f0f14;padding:9px 14px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .1s; }
.lrow:hover { background:#14141a; }
.team-wrap { padding:18px 24px; }
.team-hint { font-size:12px;color:#666;margin-bottom:14px; }
.person-pills { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px; }
.ppill { background:#14141a;border:1px solid #2e2e38;border-radius:20px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:12px;color:#aaa;font-weight:600; }
.ppill.sel { background:#57DF7F22;border-color:#57DF7F;color:#57DF7F; }
.ppill-sub { font-size:9px;opacity:.7; }
.mcard { background:#14141a;border:1px solid #222;border-radius:12px;padding:14px;margin-bottom:12px; }
.mhead { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
.mav { width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff; }
.mevents { display:flex;flex-wrap:wrap;gap:8px; }
.minicard { background:#0f0f14;border-radius:10px;padding:8px 12px;cursor:pointer;min-width:145px;flex:0 0 auto;transition:background .15s;border:1px solid #222; }
.minicard:hover { background:#1a1a24; }
.empty { text-align:center;color:#555;padding:60px;font-size:14px; }
.modal-bg { position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px; }
.modal-box { background:#15151e;border:1px solid #2a2a3a;border-radius:18px;max-width:570px;width:100%;max-height:88vh;overflow-y:auto;padding:24px; }
.modal-accent { height:4px;border-radius:4px;margin-bottom:18px; }
.modal-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px; }
.modal-close { background:transparent;border:none;color:#666;font-size:18px;cursor:pointer; }
.modal-title { font-size:20px;font-weight:800;color:#fff;margin-bottom:12px;line-height:1.2; }
.modal-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px; }
.mcell { background:#0f0f14;border-radius:8px;padding:9px 12px; }
.mcell-lbl { font-size:9px;color:#666;margin-bottom:2px; }
.mcell-val { font-size:12px;color:#ddd;font-weight:600; }
.msec { background:#0f0f14;border-radius:8px;padding:10px 12px;margin-bottom:10px; }

.mlink { display:block;text-align:center;background:linear-gradient(135deg,#57DF7F,#3A6BF5);color:#000;font-weight:700;font-size:13px;padding:11px;border-radius:10px;text-decoration:none;margin-top:4px; }
.mperson { display:flex;align-items:center;gap:6px;background:#1a1a24;border-radius:20px;padding:4px 10px;margin:3px; }
</style>

const REGS=["Todas",...[...new Set(E.map(e=>e.regiao))].sort()];

function hsl(s){return `hsl(${(s.charCodeAt(0)*47)%360},50%,42%)`;}
function prox(ev){return TEAM.filter(p=>ev.escopo==="Internacional"&&p.regiao==="Internacional"||ev.escopo==="Brasil"&&p.estado===ev.estado);}

let S={escopo:"Todos",cat:"Todas",reg:"Todas",marca:"Todas",mes:"Todos",bpp:"",qtd:1,busca:"",view:"cards",modal:null,sel:[]};

function filtered(){
  const budget=S.bpp?parseFloat(S.bpp)*S.qtd:null;
  const bl=S.busca.toLowerCase();
  return E.filter(ev=>{
    if(S.escopo!=="Todos"&&ev.escopo!==S.escopo)return false;
    if(S.cat!=="Todas"&&ev.cat!==S.cat)return false;
    if(S.reg!=="Todas"&&ev.regiao!==S.reg)return false;
    if(S.mes!=="Todos"&&ev.mes!==S.mes)return false;
    if(S.marca==="Internacional"&&ev.escopo!=="Internacional")return false;
    if(S.marca!=="Todas"&&S.marca!=="Internacional"&&ev.marca!==S.marca)return false;
    if(budget&&ev.vm&&ev.vm*S.qtd>budget)return false;
    if(bl&&!ev.evento.toLowerCase().includes(bl)&&!ev.desc.toLowerCase().includes(bl))return false;
    return true;
  }).sort((a,b)=>a.n-b.n||a.evento.localeCompare(b.evento));
}

function set(k,v){S[k]=v;render();}
function tog(v){S.sel=S.sel.includes(v)?S.sel.filter(x=>x!==v):[...S.sel,v];render();}
function clr(){S={...S,escopo:"Todos",cat:"Todas",reg:"Todas",marca:"Todas",mes:"Todos",bpp:"",qtd:1,busca:"",sel:[]};render();}

function bdg(t,c,bg,big){
  const p=big?"3px 10px":"2px 7px",fs=big?11:10;
  return `<span class="badge" style="background:${bg};color:${c};font-size:${fs}px;padding:${p}">${t}</span>`;
}

function render(){
  const fl=filtered();
  const cv=fl.filter(e=>e.vm!==null&&e.vm>0);
  const med=cv.length?Math.round(cv.reduce((s,e)=>s+e.vm,0)/cv.length):0;
  const tbgt=S.bpp&&S.qtd>0?parseFloat(S.bpp)*S.qtd:null;

  const opts=(arr,cur)=>arr.map(v=>`<option${v===cur?" selected":""}>${v}</option>`).join("");

  // CARDS
  let content="";
  if(S.view==="cards"){
    if(!fl.length){content=`<div class="empty">Nenhum evento encontrado com esses filtros.</div>`;}
    else{content=`<div class="grid">${fl.map(ev=>{
      const cm=CAT_META[ev.cat]||{};
      const mm=MARCA_META[ev.marca]||{};
      const px=prox(ev);
      const tot=ev.vm&&S.qtd>1?ev.vm*S.qtd:null;
      return `<div class="card" onclick="set('modal',${ev.id})">
        <div class="card-accent" style="background:linear-gradient(90deg,${cm.color||"#57DF7F"},transparent)"></div>
        <div class="card-header"><div class="badges">${bdg(ev.mes,"#999","#1e1e1e")} ${bdg(`${cm.emoji||""}${ev.cat}`,cm.color,cm.bg)}</div>${bdg(ev.marca,mm.color,mm.bg)}</div>
        <div class="card-title">${ev.evento}</div>
        <div class="card-local">📍 ${ev.local}</div>
        <div class="card-desc">${ev.desc}</div>
        <div class="card-bottom">
          <div><div class="card-valor" style="color:${ev.vm!==null?'#57DF7F':'#666'}">${ev.vd}</div>${tot?`<div class="card-total">Total(${S.qtd}×): R$${tot.toLocaleString("pt-BR")}</div>`:""}</div>
          ${px.length?`<div class="avatars">${px.slice(0,4).map(p=>`<div class="av" title="${p.nome}" style="background:${hsl(p.nome)}">${p.nome[0]}</div>`).join("")}</div>`:""}
        </div>
      </div>`;
    }).join("")}</div>`;}
  }

  // LISTA
  if(S.view==="lista"){
    if(!fl.length){content=`<div class="empty">Nenhum evento encontrado.</div>`;}
    else{content=`<div class="lista-wrap">
      <div class="lista-head"><span>MÊS</span><span>EVENTO</span><span>MARCA</span><span>ESCOPO</span><span>CATEGORIA</span><span>VALOR</span></div>
      ${fl.map(ev=>{
        const cm=CAT_META[ev.cat]||{};const mm=MARCA_META[ev.marca]||{};
        return `<div class="lrow" onclick="set('modal',${ev.id})">
          <span style="font-size:11px;color:#888">${ev.mes}</span>
          <span style="font-size:12px;font-weight:700;color:#e8e8e8">${ev.evento}</span>
          ${bdg(ev.marca,mm.color,mm.bg)}
          ${bdg(ev.escopo==="Brasil"?"🇧🇷 BR":"🌍 Intl",ev.escopo==="Brasil"?"#0B8043":"#9B59B6","#1a2a1a")}
          <span style="font-size:10px;color:${cm.color||"#aaa"}">${cm.emoji||""} ${ev.cat}</span>
          <span style="font-size:12px;font-weight:700;color:${ev.vm!==null?'#57DF7F':'#555'}">${ev.vd}</span>
        </div>`;
      }).join("")}
    </div>`;}
  }

  // TIME
  if(S.view==="time"){
    const pills=TEAM.map(p=>`<button class="ppill${S.sel.includes(p.nome)?" sel":""}" onclick="tog('${p.nome}')">
      <div style="width:22px;height:22px;border-radius:50%;background:${hsl(p.nome)};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">${p.nome[0]}</div>
      <div><div>${p.nome}</div><div class="ppill-sub">${p.cidade!=="—"?p.cidade:"indefinida"}</div></div>
    </button>`).join("");
    const members=S.sel.length===0?`<div class="empty">Selecione pelo menos uma pessoa.</div>`:
      TEAM.filter(p=>S.sel.includes(p.nome)).map(p=>{
        const evs=E.filter(ev=>p.regiao==="Internacional"?ev.escopo==="Internacional":ev.estado===p.estado).sort((a,b)=>a.n-b.n);
        return `<div class="mcard">
          <div class="mhead">
            <div class="mav" style="background:${hsl(p.nome)}">${p.nome[0]}</div>
            <div><div style="font-weight:700;font-size:13px;color:#fff">${p.nome}</div><div style="font-size:11px;color:#888">${p.cargo} · ${p.cidade!=="—"?`${p.cidade}, ${p.estado}`:"Localização a definir"}</div></div>
            <div style="margin-left:auto">${bdg(`${evs.length} evento${evs.length!==1?"s":""}`,evs.length?"#57DF7F":"#888","#1a2a1a",true)}</div>
          </div>
          ${evs.length===0?`<div style="font-size:12px;color:#555;font-style:italic">Nenhum evento mapeado na região.</div>`:`
          <div class="mevents">${evs.map(ev=>{const cm=CAT_META[ev.cat]||{};return `<div class="minicard" onclick="set('modal',${ev.id})" style="border-color:${cm.color||"#333"}44">
            <div style="font-size:10px;color:#666;margin-bottom:2px">${ev.mes}</div>
            <div style="font-size:12px;font-weight:700;color:#e8e8e8;margin-bottom:4px">${ev.evento}</div>
            ${bdg(`${cm.emoji||""}${ev.cat}`,cm.color,cm.bg)}
            <div style="font-size:11px;font-weight:700;color:${ev.vm!==null?'#57DF7F':'#555'};margin-top:6px">${ev.vd}</div>
          </div>`;}).join("")}</div>`}
        </div>`;
      }).join("");
    content=`<div class="team-wrap"><div class="team-hint">Selecione membros para ver eventos próximos de onde moram.</div><div class="person-pills">${pills}</div>${members}</div>`;
  }

  // MODAL
  let modal="";
  if(S.modal){
    const ev=E.find(e=>e.id===S.modal);
    if(ev){
      const cm=CAT_META[ev.cat]||{};const mm=MARCA_META[ev.marca]||{};const px=prox(ev);
      const tot=ev.vm&&S.qtd>1?ev.vm*S.qtd:null;
      modal=`<div class="modal-bg" onclick="set('modal',null)">
        <div class="modal-box" onclick="event.stopPropagation()">
          <div class="modal-accent" style="background:linear-gradient(90deg,${cm.color||"#57DF7F"},${mm.color||"#3A6BF5"})"></div>
          <div class="modal-top">
            <div class="badges">${bdg(`${cm.emoji||""}${ev.cat}`,cm.color,cm.bg,true)} ${bdg(ev.escopo==="Brasil"?"🇧🇷 Brasil":"🌍 Internacional",ev.escopo==="Brasil"?"#0B8043":"#9B59B6","#1a2a1a",true)} ${bdg(ev.marca,mm.color,mm.bg,true)}</div>
            <button class="modal-close" onclick="set('modal',null)">✕</button>
          </div>
          <div class="modal-title">${ev.evento}</div>
          <div class="modal-grid">
            <div class="mcell"><div class="mcell-lbl">📅 Mês</div><div class="mcell-val">${ev.mes}</div></div>
            <div class="mcell"><div class="mcell-lbl">📍 Local</div><div class="mcell-val">${ev.local}</div></div>
            <div class="mcell"><div class="mcell-lbl">🗺️ Região</div><div class="mcell-val">${ev.regiao}</div></div>
            <div class="mcell"><div class="mcell-lbl">🏷️ Estado/País</div><div class="mcell-val">${ev.estado}</div></div>
          </div>
          <div class="msec"><div class="msec-lbl">💰 VALOR</div>
            <div style="font-size:18px;font-weight:800;color:${ev.vm!==null?'#57DF7F':'#666'}">${ev.vd}</div>
            ${tot?`<div style="font-size:12px;color:#888;margin-top:4px">Para ${S.qtd} pessoas: <strong style="color:#57DF7F">R$ ${tot.toLocaleString("pt-BR")}</strong> (mínimo)</div>`:""}
          </div>
          <div class="msec"><div class="msec-lbl">📝 DESCRIÇÃO</div><div style="font-size:12px;color:#bbb;line-height:1.6">${ev.desc}</div></div>
          ${px.length?`<div class="msec"><div class="msec-lbl">👥 TIME PRÓXIMO</div><div style="display:flex;flex-wrap:wrap">${px.map(p=>`<div class="mperson"><div style="width:20px;height:20px;border-radius:50%;background:${hsl(p.nome)};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff">${p.nome[0]}</div><span style="font-size:11px;color:#ddd">${p.nome}</span><span style="font-size:10px;color:#555">${p.cidade}</span></div>`).join("")}</div></div>`:""}
          ${ev.site?`<a class="mlink" href="${ev.site}" target="_blank">Acessar site oficial →</a>`:""}
        </div>
      </div>`;
    }
  }

  document.getElementById("root").innerHTML=`
    <div class="header">
      <div class="logo-row">
        <div class="logo-icon">S</div>

        <div class="stat"><span class="stat-num">${med?`R$${med.toLocaleString("pt-BR")}`:"—"}</span><span class="stat-lbl">ticket médio</span></div>

      </div>
    </div>
    <div class="filter-bar">
      <div class="fg"><label>Buscar</label><input style="width:155px" placeholder="nome ou desc..." value="${S.busca}" oninput="set('busca',this.value)"></div>

      <div class="fg"><label>Mês</label><select onchange="set('mes',this.value)">${opts(["Todos",...MESES],S.mes)}</select></div>
      <div class="fg"><label>Budget/pessoa</label><input style="width:110px" type="number" placeholder="ex: 2000" value="${S.bpp}" oninput="set('bpp',this.value)"></div>
      <div class="fg"><label>Nº pessoas</label><input style="width:65px" type="number" min="1" max="9" value="${S.qtd}" oninput="set('qtd',parseInt(this.value)||1)"></div>
      <div class="view-btns">
        <button class="vbtn${S.view==="cards"?" active":""}" onclick="set('view','cards')">⬜ Cards</button>
        <button class="vbtn${S.view==="lista"?" active":""}" onclick="set('view','lista')">≡ Lista</button>
        <button class="vbtn${S.view==="time"?" active":""}" onclick="set('view','time')">👥 Time</button>
        <button class="vbtn clear" onclick="clr()">✕ Limpar</button>
      </div>
    </div>
    ${content}
    ${modal}
  `;
}
render();
</script>
</body>
</html>
